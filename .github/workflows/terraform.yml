name: Terraform CI

on:
  push:
    branches: [main]
    paths:
      - "*.tf"
      - "modules/**"
      - "environments/**"
      - ".tflint.hcl"
      # - ".trivyignore"  # Trivy removed — supply chain compromise
      - ".checkov.yml"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: [main]
    paths:
      - "*.tf"
      - "modules/**"
      - "environments/**"
      - ".tflint.hcl"
      # - ".trivyignore"  # Trivy removed — supply chain compromise
      - ".checkov.yml"
      - ".github/workflows/terraform.yml"

permissions:
  id-token: write
  contents: read

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC: true
  TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  quality:
    name: Terraform Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: TFLint
        uses: terraform-linters/setup-tflint@v6
      - run: |
          tflint --init
          tflint --recursive

      # Trivy IaC Scan — REMOVED 2026-03-20
      # aquasecurity/trivy-action compromised (supply chain attack):
      # https://www.stepsecurity.io/blog/trivy-compromised-a-second-time---malicious-v0-69-4-release
      # Checkov provides equivalent IaC scanning coverage.

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: false
          config_file: .checkov.yml

  test:
    name: Terraform Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9"

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Test
        run: terraform test

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [quality, test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -var-file=environments/dev.tfvars -out=tfplan -input=false
