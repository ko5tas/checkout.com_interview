name: Budget Guard

# Daily check: if Azure credits are exhausted or expired, destroy all
# resources and set the budget to £0 to prevent any accidental charges.
# Self-disabling: once triggered, it disables itself via the schedule.

on:
  schedule:
    - cron: "23 7 * * *"  # Daily at ~07:23 UTC (before working hours UK)
  workflow_dispatch:       # Manual trigger for testing

permissions:
  id-token: write
  contents: read
  issues: write

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC: true
  TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  # Credits expire 30 days after free trial signup.
  # Set this to your actual expiry date (YYYY-MM-DD).
  CREDIT_EXPIRY_DATE: ${{ vars.CREDIT_EXPIRY_DATE || '2026-04-17' }}
  BUDGET_AMOUNT: "147.77"
  BUDGET_CURRENCY: "GBP"

jobs:
  check-credits:
    name: Check Credit Balance
    runs-on: ubuntu-latest
    outputs:
      credits_exhausted: ${{ steps.check.outputs.exhausted }}
      current_spend: ${{ steps.check.outputs.current_spend }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Query cumulative spend and check expiry
        id: check
        env:
          SUB_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail

          # 1. Check if credits have expired by date
          TODAY=$(date -u +%Y-%m-%d)
          if [[ "$TODAY" > "$CREDIT_EXPIRY_DATE" || "$TODAY" == "$CREDIT_EXPIRY_DATE" ]]; then
            echo "Credits expired on $CREDIT_EXPIRY_DATE"
            echo "exhausted=true" >> "$GITHUB_OUTPUT"
            echo "reason=credits-expired-on-${CREDIT_EXPIRY_DATE}" >> "$GITHUB_OUTPUT"
            echo "current_spend=N/A" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2. Query cumulative spend via Cost Management API
          RESPONSE=$(az rest --method post \
            --url "https://management.azure.com/subscriptions/${SUB_ID}/providers/Microsoft.CostManagement/query?api-version=2023-11-01" \
            --body '{
              "type": "ActualCost",
              "timeframe": "BillingMonthToDate",
              "dataset": {
                "granularity": "None",
                "aggregation": {
                  "totalCost": {
                    "name": "Cost",
                    "function": "Sum"
                  }
                }
              }
            }' 2>/dev/null || echo '{"properties":{"rows":[]}}')

          CURRENT_SPEND=$(echo "$RESPONSE" | jq -r '.properties.rows[0][0] // 0')
          echo "Current month spend: ${BUDGET_CURRENCY} ${CURRENT_SPEND}"
          echo "current_spend=${CURRENT_SPEND}" >> "$GITHUB_OUTPUT"

          # 3. Compare against budget (use awk for float comparison)
          EXHAUSTED=$(echo "$CURRENT_SPEND $BUDGET_AMOUNT" | awk '{print ($1 >= $2) ? "true" : "false"}')

          if [ "$EXHAUSTED" = "true" ]; then
            echo "Budget exhausted: spent ${CURRENT_SPEND} >= budget ${BUDGET_AMOUNT}"
            echo "exhausted=true" >> "$GITHUB_OUTPUT"
            echo "reason=spend-${CURRENT_SPEND}-exceeded-budget-${BUDGET_AMOUNT}" >> "$GITHUB_OUTPUT"
          else
            REMAINING=$(echo "$CURRENT_SPEND $BUDGET_AMOUNT" | awk '{printf "%.2f", $2 - $1}')
            echo "Budget OK: ${REMAINING} ${BUDGET_CURRENCY} remaining"
            echo "exhausted=false" >> "$GITHUB_OUTPUT"
            echo "reason=within-budget" >> "$GITHUB_OUTPUT"
          fi

      - name: Budget status summary
        env:
          EXHAUSTED: ${{ steps.check.outputs.exhausted }}
          REASON: ${{ steps.check.outputs.reason }}
          SPEND: ${{ steps.check.outputs.current_spend }}
        run: |
          echo "## Budget Guard — $(date -u +%Y-%m-%d)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Current spend | ${BUDGET_CURRENCY} ${SPEND} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Budget limit | ${BUDGET_CURRENCY} ${BUDGET_AMOUNT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Credit expiry | ${CREDIT_EXPIRY_DATE} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Exhausted | ${EXHAUSTED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Reason | ${REASON} |" >> "$GITHUB_STEP_SUMMARY"

  emergency-teardown:
    name: Emergency Teardown
    runs-on: ubuntu-latest
    needs: check-credits
    if: needs.check-credits.outputs.credits_exhausted == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9"
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Destroy dev environment
        run: |
          # Only attempt if state exists
          terraform init -backend-config="key=checkout-dev.tfstate" || exit 0

          terraform destroy \
            -var-file="environments/dev.tfvars" \
            -auto-approve \
            -no-color 2>&1 | tee destroy-output.txt || true

      - name: Set budget to zero
        env:
          SUB_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          az rest --method put \
            --url "https://management.azure.com/subscriptions/${SUB_ID}/providers/Microsoft.Consumption/budgets/free-trial-guard?api-version=2023-11-01" \
            --body '{
              "properties": {
                "category": "Cost",
                "amount": 0.01,
                "timeGrain": "Monthly",
                "timePeriod": {
                  "startDate": "2026-03-01T00:00:00Z",
                  "endDate": "2026-05-01T00:00:00Z"
                },
                "notifications": {
                  "at100percent": {
                    "enabled": true,
                    "operator": "GreaterThanOrEqualTo",
                    "threshold": 100,
                    "contactEmails": ["tarxfvj@outlook.com"]
                  }
                }
              }
            }' -o none 2>/dev/null || echo "::warning::Could not update budget to zero"

          echo "Budget set to 0.01 GBP (minimum allowed by Azure API)"

      - name: Clean up state backend
        run: |
          # Delete dev state blob
          az storage blob delete \
            --account-name "sttfstatede4c37db" \
            --container-name "tfstate" \
            --name "checkout-dev.tfstate" \
            --auth-mode login 2>/dev/null || true

          # Check if other state files exist
          BLOB_COUNT=$(az storage blob list \
            --account-name "sttfstatede4c37db" \
            --container-name "tfstate" \
            --auth-mode login \
            --query "length([?ends_with(name, '.tfstate')])" \
            -o tsv 2>/dev/null || echo "0")

          if [ "$BLOB_COUNT" = "0" ]; then
            echo "No other state files — deleting state backend"
            az group delete --name "rg-tfstate-uksouth" --yes --no-wait
          fi

      - name: Open issue documenting the teardown
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REASON: ${{ needs.check-credits.outputs.reason }}
          SPEND: ${{ needs.check-credits.outputs.current_spend }}
        run: |
          gh issue create \
            --title "Budget Guard: emergency teardown — $(date -u +%Y-%m-%d)" \
            --body "## Budget Guard triggered emergency teardown

          | Detail | Value |
          |--------|-------|
          | **Date** | $(date -u +%Y-%m-%dT%H:%M:%SZ) |
          | **Reason** | ${REASON} |
          | **Spend** | ${BUDGET_CURRENCY} ${SPEND} |
          | **Budget** | ${BUDGET_CURRENCY} ${BUDGET_AMOUNT} |
          | **Credit expiry** | ${CREDIT_EXPIRY_DATE} |

          ### Actions taken
          1. Destroyed dev environment (terraform destroy)
          2. Set budget to GBP 0.01 (Azure minimum)
          3. Cleaned up state backend if no other environments
          4. This workflow will continue running daily but no-op (nothing to destroy)

          ### To re-enable
          1. Add more credits or switch to a funded subscription
          2. Update CREDIT_EXPIRY_DATE repo variable
          3. Update budget amount via az rest or Azure Portal
          4. Re-run deploy.yml to re-provision" \
            --label "ops,budget"
