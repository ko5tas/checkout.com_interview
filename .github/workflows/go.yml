name: Go CI

on:
  push:
    branches: [main]
    paths:
      - "function-app/**"
      - ".golangci.yml"
      - ".github/workflows/go.yml"
  pull_request:
    branches: [main]
    paths:
      - "function-app/**"
      - ".golangci.yml"
      - ".github/workflows/go.yml"

permissions:
  contents: read
  security-events: write # Required for CodeQL SARIF upload

jobs:
  quality:
    name: Go Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: function-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: function-app/go.mod

      - name: Go Build
        run: go build -o handler .

      - name: Go Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: function-app

  test:
    name: Go Tests
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: function-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: function-app/go.mod

      - name: Run Tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Coverage Report
        run: go tool cover -func=coverage.out

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: function-app/coverage.out

  # --- SAST: CodeQL deep semantic analysis ---
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: go

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"

  # --- SAST: govulncheck (Go-native dependency vulnerability scanner) ---
  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: function-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: function-app/go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  # --- DAST: spin up the server and probe it ---
  dast:
    name: DAST Security Probes
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: function-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: function-app/go.mod

      - name: Build and start server
        run: |
          go build -o handler .
          ./handler &
          sleep 2

      - name: DAST - SQL injection probes
        run: |
          # Attempt SQL injection via message field
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8080/api/message \
            -H "Content-Type: application/json" \
            -d '{"message":"'"'"' OR 1=1 --"}')
          echo "SQL injection probe: HTTP $STATUS"
          # Should get 200 (echoes back) — not a DB-backed app, but validates no crash

      - name: DAST - XSS probes
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8080/api/message \
            -H "Content-Type: application/json" \
            -d '{"message":"<script>alert(1)</script>"}')
          echo "XSS probe: HTTP $STATUS"

      - name: DAST - Oversized payload
        run: |
          # Generate 2MB payload (over our 1MB limit)
          PAYLOAD=$(python3 -c "print('{\"message\":\"' + 'A'*2097152 + '\"}')")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8080/api/message \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "Oversized payload probe: HTTP $STATUS"
          if [ "$STATUS" != "413" ]; then
            echo "FAIL: Expected 413, got $STATUS"
            exit 1
          fi

      - name: DAST - Method tampering
        run: |
          for METHOD in GET PUT DELETE PATCH OPTIONS; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X "$METHOD" http://localhost:8080/api/message)
            echo "$METHOD probe: HTTP $STATUS"
            if [ "$STATUS" != "405" ]; then
              echo "FAIL: Expected 405 for $METHOD, got $STATUS"
              exit 1
            fi
          done

      - name: DAST - Content-Type enforcement
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8080/api/message \
            -H "Content-Type: text/xml" \
            -d '<message>test</message>')
          echo "Wrong Content-Type probe: HTTP $STATUS"
          if [ "$STATUS" != "415" ]; then
            echo "FAIL: Expected 415, got $STATUS"
            exit 1
          fi

      - name: DAST - Path traversal
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "http://localhost:8080/api/message/../../../etc/passwd" \
            -H "Content-Type: application/json" \
            -d '{"message":"test"}')
          echo "Path traversal probe: HTTP $STATUS"

      - name: DAST - Header injection
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8080/api/message \
            -H "Content-Type: application/json" \
            -H "X-Forwarded-For: 127.0.0.1" \
            -H "X-Custom-Header: \r\nInjected: true" \
            -d '{"message":"test"}')
          echo "Header injection probe: HTTP $STATUS"

      - name: Stop server
        if: always()
        run: pkill handler || true
