name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - plan-only
          - apply
          - destroy

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  issues: write

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC: true
  TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  # --- Build Go binary (skip on destroy) ---
  build-function:
    name: Build Function App
    runs-on: ubuntu-latest
    if: inputs.action != 'destroy'
    defaults:
      run:
        working-directory: function-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: function-app/go.mod

      - name: Build Linux amd64 binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o handler .

      - name: Package Function App
        run: |
          mkdir -p /tmp/func-release
          cp handler /tmp/func-release/
          cp host.json /tmp/func-release/
          cp -r message /tmp/func-release/
          cd /tmp/func-release && zip -r /tmp/function-app.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: function-app
          path: /tmp/function-app.zip

  # --- Build Smoke Test Function (skip on destroy) ---
  build-smoke-test:
    name: Build Smoke Test Function
    runs-on: ubuntu-latest
    if: inputs.action != 'destroy'
    defaults:
      run:
        working-directory: smoke-test-function
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: smoke-test-function/go.mod

      - name: Build Linux amd64 binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o handler .

      - name: Package Smoke Test Function
        run: |
          mkdir -p /tmp/smoke-release
          cp handler /tmp/smoke-release/
          cp host.json /tmp/smoke-release/
          cp -r smoketest /tmp/smoke-release/
          cd /tmp/smoke-release && zip -r /tmp/smoke-test.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-function
          path: /tmp/smoke-test.zip

  # --- Terraform Plan ---
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    outputs:
      plan-summary: ${{ steps.plan.outputs.summary }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9"
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify State Alignment
        env:
          STATE_RG: rg-tfstate-westeurope
          STATE_SA: sttfstate964b29c3
          STATE_KEY: checkout-${{ inputs.environment }}.tfstate
          TARGET_RG: rg-checkout-${{ inputs.environment }}
        run: bash scripts/verify-state.sh

      - name: Terraform Init
        env:
          ENVIRONMENT: ${{ inputs.environment }}
        run: terraform init -backend-config="key=checkout-${ENVIRONMENT}.tfstate"

      - name: Terraform Plan
        id: plan
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          ACTION: ${{ inputs.action }}
        run: |
          set -o pipefail

          DESTROY_FLAG=""
          if [ "$ACTION" = "destroy" ]; then
            DESTROY_FLAG="-destroy"
          fi

          terraform plan \
            -var-file="environments/${ENVIRONMENT}.tfvars" \
            -out=tfplan \
            -input=false \
            $DESTROY_FLAG \
            -no-color 2>&1 | tee plan-output.txt

          SUMMARY=$(grep -E "Plan:|No changes" plan-output.txt | tail -1)
          echo "summary=${SUMMARY}" >> "$GITHUB_OUTPUT"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: tfplan

      - name: Upload plan output
        uses: actions/upload-artifact@v7
        with:
          name: plan-output
          path: plan-output.txt

      - name: Plan Summary
        run: |
          echo "## Terraform Plan — ${{ inputs.environment }} (${{ inputs.action }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -20 plan-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # --- AI Plan Analysis ---
  ai-plan-analysis:
    name: AI Plan Analysis
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: inputs.action != 'plan-only'
    steps:
      - uses: actions/checkout@v4

      - name: Download plan output
        uses: actions/download-artifact@v8
        with:
          name: plan-output

      - name: Analyse plan
        run: python3 scripts/analyze-plan.py plan-output.txt >> "$GITHUB_STEP_SUMMARY"

  # --- Approval Gate (uses GitHub Environments) ---
  approval:
    name: Approval
    runs-on: ubuntu-latest
    needs: [terraform-plan, ai-plan-analysis]
    if: inputs.action != 'plan-only'
    environment: ${{ inputs.environment }}
    steps:
      - name: Approved
        run: echo "Deployment approved for ${{ inputs.environment }}"

  # --- Terraform Apply ---
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: approval
    outputs:
      function-app-name: ${{ steps.outputs.outputs.func-name }}
      smoke-test-name: ${{ steps.outputs.outputs.smoke-name }}
      smoke-test-rg: ${{ steps.outputs.outputs.smoke-rg }}
      resource-group: ${{ steps.outputs.outputs.rg-name }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9"
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Read-only state guard: if the plan was made against a clean slate but
      # resources have since appeared (e.g., APIM deletion was still in progress),
      # fail fast rather than waste 45 min on a doomed apply.
      - name: Pre-Apply State Guard (read-only)
        if: inputs.action == 'apply'
        env:
          TARGET_RG: rg-checkout-${{ inputs.environment }}
          STATE_SA: sttfstate964b29c3
          STATE_CONTAINER: tfstate
          STATE_KEY: checkout-${{ inputs.environment }}.tfstate
        run: |
          STATE_SIZE=$(az storage blob show \
            --account-name "$STATE_SA" --container-name "$STATE_CONTAINER" \
            --name "$STATE_KEY" --query "properties.contentLength" \
            --output tsv 2>/dev/null || echo "0")
          RG_EXISTS=$(az group exists --name "$TARGET_RG" 2>/dev/null)

          if [[ "$RG_EXISTS" == "true" && "$STATE_SIZE" == "0" ]]; then
            echo "::error::FATAL: RG '$TARGET_RG' exists but state is empty. Plan is stale — cannot apply."
            echo "This means resources were created outside of this plan's scope."
            echo "Fix: destroy the RG, clean state, and re-run the full plan+apply."
            exit 1
          fi
          echo "✓ State guard passed (RG=$RG_EXISTS, state=${STATE_SIZE}b)"

      - name: Terraform Init
        env:
          ENVIRONMENT: ${{ inputs.environment }}
        run: terraform init -backend-config="key=checkout-${ENVIRONMENT}.tfstate"

      - name: Download plan
        uses: actions/download-artifact@v8
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Capture outputs
        id: outputs
        if: inputs.action == 'apply'
        run: |
          echo "func-name=$(terraform output -raw function_app_name)" >> "$GITHUB_OUTPUT"
          echo "smoke-name=$(terraform output -raw smoke_test_function_name)" >> "$GITHUB_OUTPUT"
          echo "smoke-rg=$(terraform output -raw smoke_test_resource_group_name)" >> "$GITHUB_OUTPUT"
          echo "rg-name=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"

      - name: Generate audit log
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          ACTION: ${{ inputs.action }}
          ACTOR: ${{ github.actor }}
          PLAN_SUMMARY: ${{ needs.terraform-plan.outputs.plan-summary }}
        run: |
          cat > audit-log.json <<AUDIT
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "actor": "$ACTOR",
            "environment": "$ENVIRONMENT",
            "action": "$ACTION",
            "plan_summary": "$PLAN_SUMMARY",
            "result": "success",
            "run_id": "${{ github.run_id }}"
          }
          AUDIT

      - name: Upload audit log
        uses: actions/upload-artifact@v7
        with:
          name: audit-deploy-${{ github.run_id }}
          path: audit-log.json
          retention-days: 90

  # --- Deploy Function App code (apply only) ---
  deploy-function:
    name: Deploy Function Code
    runs-on: ubuntu-latest
    needs: [terraform-apply, build-function, build-smoke-test]
    if: inputs.action == 'apply'
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download function artifact
        uses: actions/download-artifact@v8
        with:
          name: function-app

      - name: Download smoke test artifact
        uses: actions/download-artifact@v8
        with:
          name: smoke-test-function

      - name: Deploy main Function App
        env:
          FUNC_NAME: ${{ needs.terraform-apply.outputs.function-app-name }}
          RG_NAME: ${{ needs.terraform-apply.outputs.resource-group }}
        run: |
          az functionapp deployment source config-zip \
            --name "$FUNC_NAME" \
            --resource-group "$RG_NAME" \
            --src function-app.zip \
            --build-remote false \
            --timeout 300
          echo "Main function deployed!"

      - name: Deploy smoke test Function App
        env:
          FUNC_NAME: ${{ needs.terraform-apply.outputs.smoke-test-name }}
          RG_NAME: ${{ needs.terraform-apply.outputs.smoke-test-rg }}
        run: |
          az functionapp deployment source config-zip \
            --name "$FUNC_NAME" \
            --resource-group "$RG_NAME" \
            --src smoke-test.zip \
            --build-remote false \
            --timeout 300
          echo "Smoke test function deployed!"

  # --- Smoke Tests (apply only) ---
  # Two phases: control-plane checks (ARM), then data-plane mTLS test (VNet-internal)
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [terraform-apply, deploy-function]
    if: inputs.action == 'apply'
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Phase 1: Control-plane checks
      - name: Verify main Function App is Running
        env:
          FUNC_NAME: ${{ needs.terraform-apply.outputs.function-app-name }}
          RG_NAME: ${{ needs.terraform-apply.outputs.resource-group }}
        run: |
          STATE=$(az functionapp show \
            --name "$FUNC_NAME" \
            --resource-group "$RG_NAME" \
            --query "state" -o tsv)
          echo "Main Function App state: $STATE"
          [ "$STATE" = "Running" ] || { echo "FAIL: state is $STATE"; exit 1; }

      - name: Verify smoke test Function App is Running
        env:
          FUNC_NAME: ${{ needs.terraform-apply.outputs.smoke-test-name }}
          RG_NAME: ${{ needs.terraform-apply.outputs.smoke-test-rg }}
        run: |
          STATE=$(az functionapp show \
            --name "$FUNC_NAME" \
            --resource-group "$RG_NAME" \
            --query "state" -o tsv)
          echo "Smoke Test Function App state: $STATE"
          [ "$STATE" = "Running" ] || { echo "FAIL: state is $STATE"; exit 1; }

      - name: Verify functions deployed
        env:
          FUNC_NAME: ${{ needs.terraform-apply.outputs.function-app-name }}
          RG_NAME: ${{ needs.terraform-apply.outputs.resource-group }}
        run: |
          FUNCTIONS=$(az functionapp function list \
            --name "$FUNC_NAME" \
            --resource-group "$RG_NAME" \
            --query "length(@)" -o tsv)
          echo "Deployed functions: $FUNCTIONS"
          [ "$FUNCTIONS" -ge 1 ] || { echo "FAIL: no functions deployed"; exit 1; }

      # Phase 2: Data-plane mTLS test via VNet-internal smoke test function
      # The smoke test function runs inside the VNet and:
      #   1. Fetches the client cert from Key Vault (Managed Identity + RBAC)
      #   2. Makes an HTTPS POST with mTLS to the main function's private endpoint
      #   3. Validates the response (status, body, headers)
      - name: Invoke mTLS smoke test (VNet-internal)
        env:
          FUNC_NAME: ${{ needs.terraform-apply.outputs.smoke-test-name }}
          RG_NAME: ${{ needs.terraform-apply.outputs.smoke-test-rg }}
        run: |
          echo "Triggering VNet-internal mTLS smoke test..."

          # Wait for cold start (Consumption plan may need a moment)
          sleep 30

          # Invoke the smoke test function via ARM master key
          MASTER_KEY=$(az functionapp keys list \
            --name "$FUNC_NAME" \
            --resource-group "$RG_NAME" \
            --query "masterKey" -o tsv)

          HOSTNAME=$(az functionapp show \
            --name "$FUNC_NAME" \
            --resource-group "$RG_NAME" \
            --query "defaultHostName" -o tsv)

          RESULT=$(curl -s -w "\n%{http_code}" \
            --max-time 60 \
            "https://${HOSTNAME}/api/smoketest?code=${MASTER_KEY}")

          HTTP_CODE=$(echo "$RESULT" | tail -1)
          BODY=$(echo "$RESULT" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          echo "$BODY" | jq .

          # Check pass/fail
          STATUS=$(echo "$BODY" | jq -r '.status')
          if [ "$STATUS" != "pass" ]; then
            echo "FAIL: Smoke test returned status=$STATUS"
            echo "$BODY" | jq '.tests[] | select(.passed == false)'
            exit 1
          fi

          echo "All mTLS smoke tests passed!"

      - name: Smoke test summary
        if: always()
        run: |
          echo "## Smoke Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Control Plane" >> "$GITHUB_STEP_SUMMARY"
          echo "- Main Function App: Running" >> "$GITHUB_STEP_SUMMARY"
          echo "- Smoke Test Function App: Running" >> "$GITHUB_STEP_SUMMARY"
          echo "- Functions: Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Data Plane (VNet-Internal mTLS)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Key Vault cert fetch: Tested" >> "$GITHUB_STEP_SUMMARY"
          echo "- mTLS API call: Tested" >> "$GITHUB_STEP_SUMMARY"
          echo "- Response validation: Tested" >> "$GITHUB_STEP_SUMMARY"
