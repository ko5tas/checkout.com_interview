name: AI Architect Advisor

on:
  schedule:
    - cron: "17 10 * * 0" # Sunday 10:17 UTC (off-minute to avoid fleet congestion)
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  discussions: write
  security-events: read

jobs:
  advise:
    name: AI Architecture Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: function-app/go.mod

      # --- Gather dependency versions ---
      - name: Collect current versions
        run: |
          echo "## Current Dependency Versions" > versions.md
          echo "" >> versions.md
          echo "| Dependency | Current Version |" >> versions.md
          echo "|-----------|----------------|" >> versions.md

          # Read ACTUAL locked versions from .terraform.lock.hcl (inlined to avoid subshell issues)
          TF_AZURERM=$(grep -A2 'hashicorp/azurerm' .terraform.lock.hcl 2>/dev/null | grep '  version' | head -1 | tr -d ' "' | cut -d= -f2)
          TF_AZURERM_CONSTRAINT=$(grep 'version.*=.*"~>' versions.tf | head -1 | grep -oE '"[^"]+"' | tr -d '"')
          echo "| azurerm provider | ${TF_AZURERM:-unknown} (constraint: ${TF_AZURERM_CONSTRAINT}) |" >> versions.md

          GO_VER=$(grep '^go ' function-app/go.mod | awk '{print $2}')
          echo "| Go | $GO_VER |" >> versions.md

          TF_VER=$(grep 'required_version' versions.tf | grep -oE '"[^"]+"' | tr -d '"')
          echo "| Terraform CLI (constraint) | $TF_VER |" >> versions.md

          TF_TLS=$(grep -A2 'hashicorp/tls' .terraform.lock.hcl 2>/dev/null | grep '  version' | head -1 | tr -d ' "' | cut -d= -f2)
          echo "| tls provider | ${TF_TLS:-unknown} |" >> versions.md

          TF_RANDOM=$(grep -A2 'hashicorp/random' .terraform.lock.hcl 2>/dev/null | grep '  version' | head -1 | tr -d ' "' | cut -d= -f2)
          echo "| random provider | ${TF_RANDOM:-unknown} |" >> versions.md

          TF_TIME=$(grep -A2 'hashicorp/time' .terraform.lock.hcl 2>/dev/null | grep '  version' | head -1 | tr -d ' "' | cut -d= -f2)
          echo "| time provider | ${TF_TIME:-unknown} |" >> versions.md

          echo "" >> versions.md

      # --- Fetch latest releases ---
      - name: Fetch latest dependency releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Latest Available Versions" > latest.md
          echo "" >> latest.md
          echo "| Dependency | Latest |" >> latest.md
          echo "|-----------|--------|" >> latest.md

          # Trivy removed — supply chain compromise (2026-03-20)
          for REPO in hashicorp/terraform hashicorp/terraform-provider-azurerm golangci/golangci-lint bridgecrewio/checkov; do
            LATEST=$(gh api "repos/$REPO/releases/latest" --jq '.tag_name' 2>/dev/null || echo "unknown")
            echo "| $REPO | $LATEST |" >> latest.md
          done

          echo "" >> latest.md

      # --- Fetch azurerm changelog ---
      - name: Fetch provider changelog highlights
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## azurerm Provider Recent Changes" > changelog.md
          echo "" >> changelog.md
          gh api repos/hashicorp/terraform-provider-azurerm/releases \
            --jq '.[0:3][] | "### " + .tag_name + "\n" + (.body | split("\n")[0:15] | join("\n")) + "\n"' \
            >> changelog.md 2>/dev/null || echo "Failed to fetch" >> changelog.md

      # --- Run govulncheck ---
      - name: Security scan
        working-directory: function-app
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          echo "## Go Vulnerability Report" > /tmp/vulncheck.md
          echo "" >> /tmp/vulncheck.md
          govulncheck ./... >> /tmp/vulncheck.md 2>&1 || true

      # --- Check repo health ---
      - name: Repo health check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Repository Health" > repo-health.md
          echo "" >> repo-health.md

          BP=$(gh api repos/ko5tas/checkout.com_interview/branches/main/protection \
            --jq '.required_pull_request_reviews.required_approving_review_count' 2>&1) || BP="not accessible (requires admin token)"
          echo "- Branch protection (required reviewers): $BP" >> repo-health.md

          ALERTS=$(gh api repos/ko5tas/checkout.com_interview/dependabot/alerts \
            --jq '[.[] | select(.state=="open")] | length' 2>&1) || ALERTS="not accessible (enable Dependabot alerts in repo settings)"
          echo "- Open Dependabot alerts: $ALERTS" >> repo-health.md

          SECRETS=$(gh api repos/ko5tas/checkout.com_interview/secret-scanning/alerts \
            --jq '[.[] | select(.state=="open")] | length' 2>&1) || SECRETS="not accessible (requires GitHub Advanced Security)"
          echo "- Open secret scanning alerts: $SECRETS" >> repo-health.md

          SKIPS=$(grep -c "^  - CKV" .checkov.yml 2>/dev/null || echo "0")
          echo "- Checkov skipped checks: $SKIPS (review periodically)" >> repo-health.md

          echo "" >> repo-health.md

      # --- Gather codebase context ---
      - name: Gather codebase context
        run: |
          echo "### versions.tf" > codebase.md
          cat versions.tf >> codebase.md
          echo "" >> codebase.md
          echo "### .checkov.yml" >> codebase.md
          cat .checkov.yml >> codebase.md
          echo "" >> codebase.md
          echo "### go.mod" >> codebase.md
          cat function-app/go.mod >> codebase.md

      # --- Call Gemini for AI analysis ---
      - name: AI analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "*Skipped — GEMINI_API_KEY not configured*" > ai-report.md
            exit 0
          fi

          # Combine context (truncate to avoid token limits)
          head -200 versions.md latest.md changelog.md /tmp/vulncheck.md repo-health.md codebase.md > context.txt

          python3 - <<'PYSCRIPT'
          import json, os, urllib.request

          with open("context.txt") as f:
              context = f.read()

          prompt = f"""You are a senior SRE reviewing an Azure infrastructure codebase weekly.

          Context:
          {context}

          Provide a structured report:
          1. **Critical Updates** — security vulns, deprecated features in use
          2. **Recommended Updates** — version bumps with meaningful improvements
          3. **Architecture Improvements** — new Azure features/patterns to adopt
          4. **Cost Optimisation** — ways to reduce Azure spend
          5. **Repo Health** — security posture and CI/CD hygiene assessment

          For each finding: what to change, why, effort estimate (small/medium/large).
          Be specific and actionable."""

          body = json.dumps({
              "contents": [{"parts": [{"text": prompt}]}],
              "generationConfig": {"maxOutputTokens": 2000, "temperature": 0.3},
          }).encode()

          api_key = os.environ["GEMINI_API_KEY"]
          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key={api_key}"
          req = urllib.request.Request(url, data=body, headers={"Content-Type": "application/json"})

          import time
          max_retries = 3
          for attempt in range(max_retries):
              try:
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      result = json.loads(resp.read())
                      text = result["candidates"][0]["content"]["parts"][0]["text"]
                      with open("ai-report.md", "w") as f:
                          f.write(text)
                  break
              except urllib.error.HTTPError as e:
                  if e.code == 429 and attempt < max_retries - 1:
                      wait = 2 ** (attempt + 1) * 10  # 20s, 40s
                      print(f"Rate limited (429), retrying in {wait}s (attempt {attempt + 1}/{max_retries})")
                      time.sleep(wait)
                      req = urllib.request.Request(url, data=body, headers={"Content-Type": "application/json"})
                  else:
                      with open("ai-report.md", "w") as f:
                          f.write(f"*AI analysis failed: {e}*")
                      break
              except Exception as e:
                  with open("ai-report.md", "w") as f:
                      f.write(f"*AI analysis failed: {e}*")
                  break
          PYSCRIPT

      # --- Assemble report ---
      - name: Assemble report
        run: |
          REPORT_DATE=$(date -u +%Y-%m-%d)
          echo "REPORT_DATE=$REPORT_DATE" >> "$GITHUB_ENV"

          {
            echo "# Weekly AI Architecture Review"
            echo ""
            echo "*Generated automatically — ${REPORT_DATE}*"
            echo ""
            cat versions.md
            cat latest.md
            cat /tmp/vulncheck.md
            cat repo-health.md
            echo "## AI Analysis"
            echo ""
            cat ai-report.md
          } > report.md

      # --- Commit report to reports/ folder (git-tracked, survives platform migration) ---
      - name: Commit report to repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p reports
          cp report.md "reports/${REPORT_DATE}-ai-advisor.md"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "reports/${REPORT_DATE}-ai-advisor.md"

          if git diff --cached --quiet; then
            echo "No changes to commit (report already exists for today)"
          else
            git commit -m "report: weekly AI architecture review ${REPORT_DATE}

Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>"
            git push
          fi

      # --- Post to GitHub Discussions (Announcements category) ---
      - name: Post report as Discussion
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_ID=$(gh api graphql -f query='{ repository(owner:"ko5tas", name:"checkout.com_interview") { id } }' --jq '.data.repository.id')
          CAT_ID="DIC_kwDORppi0c4C45zE"  # Announcements

          # Add footer linking to the git-tracked report
          {
            cat report.md
            echo ""
            echo "---"
            echo "📁 *This report is also committed to [\`reports/${REPORT_DATE}-ai-advisor.md\`](../blob/main/reports/${REPORT_DATE}-ai-advisor.md) for offline access.*"
          } > discussion-body.md

          BODY=$(cat discussion-body.md | jq -Rs .)
          TITLE="Weekly AI Architecture Review — ${REPORT_DATE}"

          gh api graphql -f query="
            mutation {
              createDiscussion(input: {
                repositoryId: \"${REPO_ID}\",
                categoryId: \"${CAT_ID}\",
                title: \"${TITLE}\",
                body: ${BODY}
              }) {
                discussion { url number }
              }
            }" --jq '.data.createDiscussion.discussion.url'

      # --- Close previous AI advisor issues (migration from old approach) ---
      - name: Close old AI advisor issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Close any open ai-advisor issues — reports now live in Discussions
          gh issue list --label "ai-advisor" --state open --json number --jq '.[].number' | while read -r NUM; do
            gh issue close "$NUM" --comment "Reports have moved to [Discussions](../discussions). This issue is now closed." 2>/dev/null || true
          done

      - name: Upload report artifact
        uses: actions/upload-artifact@v7
        with:
          name: ai-advisor-${{ github.run_id }}
          path: |
            report.md
          retention-days: 90
