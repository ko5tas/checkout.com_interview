skip-check:
  # Storage Account uses shared key because Azure Functions Consumption plan (Y1)
  # requires storage_account_access_key. Managed Identity-based storage is only
  # supported on Premium/Dedicated plans.
  - CKV2_AZURE_40 # Ensure storage account is not configured with Shared Key authorization

  # Consumption plan (Y1) does not support zone redundancy or minimum instance counts.
  # Production would use Premium plan with these features enabled.
  - CKV_AZURE_225 # Ensure the App Service Plan is zone redundant
  - CKV_AZURE_212 # Ensure App Service has a minimum number of instances for failover

  # LRS is intentional for Function App state storage in a dev/assessment environment.
  # Production would use GRS/ZRS.
  - CKV_AZURE_206 # Ensure that Storage Accounts use replication

  # Queue logging configured via azurerm_storage_account_queue_properties resource
  # (inline queue_properties block deprecated in azurerm v4). Checkov doesn't detect
  # the separate resource yet.
  - CKV_AZURE_33 # Ensure Storage logging is enabled for Queue service

  # Customer Managed Keys require Azure Key Vault Premium + additional setup.
  # Out of scope for this assessment. Production would implement CMK.
  - CKV2_AZURE_1 # Ensure storage for critical data are encrypted with Customer Managed Key

  # SAS expiration policy is set via sas_policy block but Checkov graph check
  # doesn't detect it. The policy is configured with 1 hour max validity.
  - CKV2_AZURE_41 # Ensure storage account is configured with SAS expiration policy

  # APIM subnet uses Internal VNet mode. Adding an NSG to the APIM subnet
  # requires specific rules for APIM management traffic. Documented as
  # a production enhancement.
  - CKV2_AZURE_31 # Ensure VNET subnet is configured with a Network Security Group

  # Storage Account public access: required for Consumption plan (Y1) deployed
  # from GitHub-hosted runners. Production with EP1+ and self-hosted runners
  # would disable public access.
  - CKV_AZURE_59 # Ensure that Storage accounts disallow public access

  # Storage Account default network rule: same as above — Allow needed for
  # GitHub-hosted runner access. Production would use Deny + VNet rules.
  - CKV_AZURE_35 # Ensure default network access rule for Storage Accounts is set to deny

  # APIM public access: Developer tier in Internal VNet mode still exposes
  # the management plane publicly. Production Premium tier with private
  # endpoint would disable public access entirely.
  - CKV_AZURE_174 # Ensure API management public access is disabled

  # Function App public network access: required for Consumption plan (Y1)
  # deployed from GitHub-hosted runners. Production with EP1+ and
  # self-hosted runners would disable public access.
  - CKV_AZURE_221 # Ensure that Azure Function App public network access is disabled

  # Key Vault firewall: default_action=Allow required for CI/CD SP on
  # GitHub-hosted runners (dynamic IPs). Production would use Deny + IP ACLs.
  - CKV_AZURE_109 # Ensure that key vault allows firewall rules settings

  # Smoke test storage account intentionally has no private endpoints —
  # it's lightweight CI tooling, not a data store. Adding PEs would
  # increase cost and complexity for zero security benefit.
  - CKV2_AZURE_33 # Ensure storage account is configured with private endpoint
